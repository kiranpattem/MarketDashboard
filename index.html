<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>India Market Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <span>🇮🇳 India Market Dashboard</span>
    <span id="clock"></span>
  </header>

  <div class="grid">

    <!-- TOP LEFT: Nifty 50 -->
    <div class="panel">
      <div class="panel-title">📈 Nifty 50 — Live</div>
      <div id="nifty-chart" style="flex:1;min-height:0;"></div>
    </div>

    <!-- TOP RIGHT: News -->
    <div class="panel">
      <div class="panel-title">📰 Market News <span id="news-time">Live</span></div>
      <div style="flex:1;min-height:0;overflow:hidden;">
        <div class="tradingview-widget-container" style="height:100%;width:100%;">
          <div class="tradingview-widget-container__widget" style="height:100%;width:100%;"></div>
          <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
          {
            "feedMode": "market",
            "market": "stock",
            "isTransparent": true,
            "displayMode": "regular",
            "width": "100%",
            "height": "100%",
            "colorTheme": "dark",
            "locale": "en"
          }
          </script>
        </div>
      </div>
    </div>

    <!-- BOTTOM LEFT: Sensex -->
    <div class="panel">
      <div class="panel-title">📈 Sensex (BSE) — Live</div>
      <div id="sensex-chart" style="flex:1;min-height:0;"></div>
    </div>

    <!-- BOTTOM RIGHT: Prediction -->
    <div class="panel">
      <div class="panel-title">🤖 AI Pattern Prediction</div>
      <div id="prediction-panel" style="flex:1;overflow-y:auto;padding:10px;">
        <div class="loading">Analyzing patterns...</div>
      </div>
    </div>

  </div>

  <script src="https://s3.tradingview.com/tv.js"></script>
  <script src="app.js"></script>
</body>
</html>
